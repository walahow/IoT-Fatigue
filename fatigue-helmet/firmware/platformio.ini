[env:esp32s3cam]
; ── Debug mode: camera frames + CSV streamed over USB-UART to debug_recorder.py
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
monitor_speed = 921600
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DSTORAGE_MODE_USB
lib_deps =
    electroniccats/MPU6050@^1.4.4
    Wire
    esp32-camera

[env:esp32s3cam_sd]
; ── Production mode: everything saved to microSD card (SD_MMC 1-bit)
; SD pins (Freenove ESP32-S3-WROOM CAM, do not modify):
;   CMD = GPIO 38  |  CLK = GPIO 39  |  D0 = GPIO 40
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DSTORAGE_MODE_SD
lib_deps =
    electroniccats/MPU6050@^1.4.4
    Wire
    esp32-camera