[env:esp32s3cam]
; ── Debug mode: camera frames + CSV streamed over USB-UART to debug_recorder.py
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
monitor_speed = 921600
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DSTORAGE_MODE_USB
lib_deps =
    electroniccats/MPU6050@^1.4.4
    Wire
    esp32-camera

[env:esp32s3cam_sd]
; ── Production mode: everything saved to microSD card (SD_MMC 1-bit)
; SD pins (Freenove ESP32-S3-WROOM CAM, do not modify):
;   CMD = GPIO 38  |  CLK = GPIO 39  |  D0 = GPIO 40
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DSTORAGE_MODE_SD
    ; ── Camera resolution & FPS (OV2640 + SD_MMC 1-bit budget) ───────────────
    ; VGA@20fps  ≈ 300-500 KB/s write  -- comfortable on 1-bit SD
    ; CIF@30fps  ≈ 180-270 KB/s write  -- even safer, smoother motion
    ; To go backto VGA@20: swap the values below
    -DCAMERA_FRAMESIZE=FRAMESIZE_CIF
    -DCAMERA_FPS=30
    -DCAMERA_JPEG_QUALITY=10
lib_deps =
    electroniccats/MPU6050@^1.4.4
    Wire
    esp32-camera